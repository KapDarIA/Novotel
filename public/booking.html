<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бронирование — Novotel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">Novotel</a>
    <a href="/login.html" id="userIconLink" class="user-icon-link" title="Войти">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </a>
  </header>

  <main class="container">
    <p><a href="/">← Все номера</a></p>
    <div id="roomInfo"></div>
    <div id="occupiedList"></div>

    <div class="form-card">
      <h2 class="page-title">Оформить бронирование</h2>
      <div id="alert" class="alert hidden"></div>
      <form id="bookingForm">
        <div class="form-group">
          <label for="check_in">Дата заезда</label>
          <input type="date" id="check_in" name="check_in" required>
        </div>
        <div class="form-group">
          <label for="check_out">Дата выезда</label>
          <input type="date" id="check_out" name="check_out" required>
        </div>
        <p class="form-footer" style="text-align:left;margin-bottom:1rem">
          Для бронирования нужна регистрация. Гости могут просматривать номера без входа.
        </p>
        <button type="submit" class="btn btn-gold btn-block">Подтвердить бронирование</button>
      </form>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
