<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — Novotel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="site-logo">Novotel</a>
      <nav class="site-nav">
        <a href="/">Номера</a>
        <a href="/services.html">Услуги</a>
        <a href="/reviews.html">Отзывы</a>
      </nav>
    </div>
    <a href="/profile.html" id="userIconLink" class="user-icon-link" title="Профиль">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </a>
  </header>

  <main class="container">
    <div id="profileContent"></div>
    <h2 style="margin-bottom:1rem;color:var(--navy)">Бронирования номеров</h2>
    <div id="bookingsList" class="booking-list"></div>
    <h2 style="margin:2rem 0 1rem;color:var(--navy)">Забронированные услуги</h2>
    <p style="margin-bottom:1rem"><a href="/services.html" class="btn btn-gold">Заказать услугу</a></p>
    <div id="serviceBookingsList" class="booking-list"></div>
    <p style="margin-top:2rem">
      <button type="button" id="logoutBtn" class="btn btn-outline">Выйти</button>
      <a href="/" class="btn btn-primary" style="margin-left:0.5rem">На главную</a>
    </p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
