<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Novotel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">Novotel</a>
    <a href="/profile.html" id="userIconLink" class="user-icon-link" title="Профиль">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </a>
  </header>

  <main class="container">
    <nav class="nav-tabs">
      <button type="button" class="nav-tab active" data-panel="roomsPanel">Номера</button>
      <button type="button" class="nav-tab" data-panel="servicesPanel">Услуги</button>
      <button type="button" class="nav-tab" data-panel="reviewsPanel">Отзывы</button>
      <a href="/">На сайт</a>
      <a href="/profile.html">Профиль</a>
    </nav>

    <section id="roomsPanel">
    <h1 class="page-title">Управление номерами</h1>
    <div id="alert" class="alert hidden"></div>

    <form id="roomForm" class="admin-room-form" enctype="multipart/form-data">
      <h2 id="formTitle">Добавить номер</h2>
      <div class="form-group">
        <label for="name">Название</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="type">Тип</label>
        <select id="type" name="type" required>
          <option value="standard">Стандарт</option>
          <option value="deluxe">Делюкс</option>
          <option value="family">Семейный</option>
          <option value="suite">Люкс</option>
          <option value="business">Бизнес</option>
        </select>
      </div>
      <div class="form-group">
        <label for="price">Цена за ночь (₽)</label>
        <input type="number" id="price" name="price" min="0" step="100" required>
      </div>
      <div class="form-group">
        <label for="description">Описание</label>
        <textarea id="description" name="description"></textarea>
      </div>
      <div class="form-group">
        <label for="image">Изображение (файл)</label>
        <input type="file" id="image" name="image" accept="image/*">
      </div>
      <div class="form-group">
        <label for="image_url">или URL изображения</label>
        <input type="text" id="image_url" name="image_url" placeholder="/images/room.jpg">
      </div>
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <button type="button" id="cancelEdit" class="btn btn-outline hidden">Отмена</button>
    </form>

    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Фото</th>
          <th>Название</th>
          <th>Тип</th>
          <th>Цена</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="roomsTableBody"></tbody>
    </table>
    </section>

    <section id="servicesPanel" class="hidden">
      <h1 class="page-title">Управление услугами</h1>
      <div id="serviceAlert" class="alert hidden"></div>
      <form id="serviceForm" class="admin-room-form">
        <h2 id="serviceFormTitle">Добавить услугу</h2>
        <div class="form-group">
          <label for="serviceName">Название</label>
          <input type="text" id="serviceName" name="name" required>
        </div>
        <div class="form-group">
          <label for="serviceCategory">Категория</label>
          <select id="serviceCategory" name="category" required>
            <option value="fitness">Фитнес</option>
            <option value="spa">SPA</option>
            <option value="bar">Бар</option>
            <option value="restaurant">Ресторан</option>
            <option value="housekeeping">Уборка номера</option>
            <option value="room_service">Еда в номер</option>
          </select>
        </div>
        <div class="form-group">
          <label for="servicePrice">Цена (0 = бесплатно)</label>
          <input type="number" id="servicePrice" name="price" min="0" step="100" value="0">
        </div>
        <div class="form-group">
          <label for="serviceDescription">Описание</label>
          <textarea id="serviceDescription" name="description"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <button type="button" id="cancelServiceEdit" class="btn btn-outline hidden">Отмена</button>
      </form>
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Категория</th>
            <th>Цена</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="servicesTableBody"></tbody>
      </table>
    </section>

    <section id="reviewsPanel" class="hidden">
      <h1 class="page-title">Модерация отзывов</h1>
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Автор</th>
            <th>Оценка</th>
            <th>Текст</th>
            <th>Дата</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="adminReviewsBody"></tbody>
      </table>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/admin-services.js"></script>
  <script src="/js/admin-reviews.js"></script>
</body>
</html>
