<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы — Novotel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/" class="site-logo">Novotel</a>
      <nav class="site-nav">
        <a href="/">Номера</a>
        <a href="/services.html">Услуги</a>
        <a href="/reviews.html" class="active">Отзывы</a>
      </nav>
    </div>
    <a href="/login.html" id="userIconLink" class="user-icon-link" title="Войти">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </a>
  </header>

  <main class="container">
    <h1 class="page-title">Отзывы об отеле Novotel</h1>
    <div id="reviewsSummary" class="reviews-summary"></div>

    <div class="filters-bar">
      <select id="sortReviews" aria-label="Сортировка отзывов">
        <option value="newest">Сначала новые</option>
        <option value="highest">Высокая оценка</option>
        <option value="lowest">Низкая оценка</option>
      </select>
    </div>

    <section class="form-card" id="reviewFormSection">
      <h2 id="formTitle">Оставить отзыв</h2>
      <div id="formAlert" class="alert hidden"></div>
      <p id="formHint" class="form-footer" style="text-align:left;margin-bottom:1rem"></p>
      <form id="reviewForm" class="hidden">
        <div class="form-group">
          <label>Ваша оценка</label>
          <div class="star-picker" id="starPicker"></div>
          <input type="hidden" id="rating" name="rating" value="5" required>
        </div>
        <div class="form-group">
          <label for="comment">Отзыв</label>
          <textarea id="comment" name="comment" required minlength="10" maxlength="2000" placeholder="Расскажите о проживании в Novotel…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Опубликовать</button>
      </form>
    </section>

    <h2 style="margin:2rem 0 1rem;color:var(--navy)">Отзывы гостей</h2>
    <div id="reviewsList"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/reviews.js"></script>
</body>
</html>
