<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Novotel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">Novotel</a>
    <a href="/login.html" id="userIconLink" class="user-icon-link" title="Войти">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </a>
  </header>

  <main class="container">
    <div class="auth-card">
      <h1 class="page-title">Вход</h1>
      <div id="alert" class="alert alert-error hidden"></div>
      <form id="authForm">
        <div class="form-group">
          <label for="login">Логин</label>
          <input type="text" id="login" name="login" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
      <p class="form-footer">Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
      <p class="form-footer" style="margin-top:0.5rem;font-size:0.8rem">Демо: admin / admin123 или user / user123</p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>document.body.dataset.mode = 'login';</script>
  <script src="/js/auth.js"></script>
</body>
</html>
